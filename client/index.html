<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ReceiptVault AI — Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/app.css">
<!-- Firebase must load before config.js / auth.js -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</head>
<body>

<div class="auth-page">
<div class="auth-card">

  <!-- Logo -->
  <div class="auth-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    </div>
    <div class="auth-ttl">ReceiptVault AI</div>
    <div class="auth-sub">Smart AI Receipt &amp; Expense Manager</div>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Log In</button>
    <button class="auth-tab"        id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- Error banner -->
  <div class="auth-err" id="authErr">
    <i class="fas fa-circle-exclamation"></i>
    <span id="authErrTxt"></span>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="auth-field">
      <label>Email</label>
      <div class="a-inp-row">
        <i class="fas fa-envelope fi"></i>
        <input type="email" id="lEmail" placeholder="you@example.com"
               autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <div class="a-inp-row">
        <i class="fas fa-lock fi"></i>
        <input type="password" id="lPass" placeholder="••••••••"
               autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <button class="auth-submit" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i><span>Log In</span>
    </button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none">
    <div class="auth-field">
      <label>Email</label>
      <div class="a-inp-row">
        <i class="fas fa-envelope fi"></i>
        <input type="email" id="sEmail" placeholder="you@example.com"
               autocomplete="email" onkeydown="if(event.key==='Enter')doSignup()">
      </div>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <div class="a-inp-row">
        <i class="fas fa-lock fi"></i>
        <input type="password" id="sPass" placeholder="At least 6 characters"
               autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignup()">
      </div>
    </div>
    <button class="auth-submit" id="signupBtn" onclick="doSignup()">
      <i class="fas fa-user-plus"></i><span>Create Account</span>
    </button>
  </div>

  <div class="auth-divider">or continue with</div>

  <!-- Google -->
  <button class="auth-google" id="googleBtn" onclick="doGoogle()">
    <svg viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6 29.6 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.8 14.1-5.1l-6.5-5.5C29.6 35.4 27 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.6 39.6 16.3 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.5 5.5C41.5 35.8 44 30.4 44 24c0-1.3-.1-2.7-.4-3.9z"/>
    </svg>
    <span id="googleTxt">Continue with Google</span>
  </button>

  <!-- Passkey / Face ID -->
  <button class="auth-pk" id="pkBtn" onclick="doPasskey()" style="display:none">
    <i class="fas fa-fingerprint"></i>
    <span id="pkTxt">Login with Face ID / Fingerprint</span>
  </button>
  <div class="auth-pk-note" id="pkNote" style="display:none">
    Your Face ID or fingerprint never leaves your device.
  </div>

  <div class="auth-foot" id="authFoot">
    Don't have an account? <a onclick="switchTab('signup')">Sign up</a>
  </div>
  <div class="auth-trust">
    <i class="fas fa-shield-halved"></i>
    <span>Your receipts remain private and securely stored.</span>
  </div>

</div><!-- /auth-card -->
</div><!-- /auth-page -->

<script>
'use strict';

/* ── Redirect already-logged-in users to dashboard ── */
RV.requireGuest('client/dashboard.html');

/* ══════════════════════════════════════════════════
   TAB SWITCHING
══════════════════════════════════════════════════ */
function switchTab(t) {
  const isL = t === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isL);
  document.getElementById('tabSignup').classList.toggle('active', !isL);
  document.getElementById('loginForm').style.display  = isL ? 'block' : 'none';
  document.getElementById('signupForm').style.display = isL ? 'none'  : 'block';
  document.getElementById('authFoot').innerHTML = isL
    ? `Don't have an account? <a onclick="switchTab('signup')">Sign up</a>`
    : `Already have an account? <a onclick="switchTab('login')">Log in</a>`;
  hideErr();
}

/* ══════════════════════════════════════════════════
   ERROR BANNER
══════════════════════════════════════════════════ */
function showErr(msg) {
  const el = document.getElementById('authErr');
  document.getElementById('authErrTxt').textContent = msg;
  el.classList.add('show');
}
function hideErr() {
  document.getElementById('authErr').classList.remove('show');
}

/* ══════════════════════════════════════════════════
   BUSY STATE — disables all buttons while a request is in flight
══════════════════════════════════════════════════ */
function setBusy(which, busy) {
  // Disable/enable all auth buttons together to prevent double-clicks
  ['loginBtn', 'signupBtn', 'googleBtn', 'pkBtn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = busy;
  });

  // Show spinner in the active button
  if (which === 'login') {
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = busy
      ? `<span class="auth-spin"></span><span>Please wait…</span>`
      : `<i class="fas fa-sign-in-alt"></i><span>Log In</span>`;
  } else if (which === 'signup') {
    const btn = document.getElementById('signupBtn');
    btn.innerHTML = busy
      ? `<span class="auth-spin"></span><span>Please wait…</span>`
      : `<i class="fas fa-user-plus"></i><span>Create Account</span>`;
  } else if (which === 'google') {
    const txt = document.getElementById('googleTxt');
    if (txt) txt.innerHTML = busy
      ? '<span class="auth-spin" style="border-top-color:#2563EB;border-color:rgba(37,99,235,.2)"></span>&nbsp;Connecting…'
      : 'Continue with Google';
  } else if (which === 'passkey') {
    const txt = document.getElementById('pkTxt');
    if (txt) txt.innerHTML = busy
      ? '<span class="auth-spin"></span>&nbsp;Verifying…'
      : 'Login with Face ID / Fingerprint';
  }
}

/* ══════════════════════════════════════════════════
   AUTH ACTIONS
   Use RV.signIn / RV.signUp / RV.googleSignIn helpers
   defined in auth.js — these wrap firebase.auth() calls.
══════════════════════════════════════════════════ */
async function doLogin() {
  hideErr();
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  if (!email || !pass) { showErr('Enter both email and password.'); return; }
  setBusy('login', true);
  try {
    await RV.signIn(email, pass);
    window.location.href = 'client/dashboard.html';
  } catch (e) {
    showErr(RV.friendlyErr(e.code, e.message));
    setBusy('login', false);
  }
}

async function doSignup() {
  hideErr();
  const email = document.getElementById('sEmail').value.trim();
  const pass  = document.getElementById('sPass').value;
  if (!email || !pass) { showErr('Enter both email and password.'); return; }
  if (pass.length < 6)  { showErr('Password must be at least 6 characters.'); return; }
  setBusy('signup', true);
  try {
    await RV.signUp(email, pass);
    window.location.href = 'client/dashboard.html';
  } catch (e) {
    showErr(RV.friendlyErr(e.code, e.message));
    setBusy('signup', false);
  }
}

async function doGoogle() {
  hideErr();
  setBusy('google', true);
  try {
    await RV.googleSignIn();
    window.location.href = 'dashboard.html';
  } catch (e) {
    showErr(RV.friendlyErr(e.code, e.message));
    setBusy('google', false);
  }
}

async function doPasskey() {
  setBusy('passkey', true);
  try {
    await RV.passkey.assert();
    // assert() just verifies the local credential — Firebase session must still be active
    const user = firebase.auth().currentUser;
    if (user) {
      window.location.href = 'client/dashboard.html';
    } else {
      throw new Error('Session expired. Please log in with email or Google first, then biometrics will work next time.');
    }
  } catch (e) {
    showErr(e.message || 'Biometric login failed.');
    setBusy('passkey', false);
  }
}

/* ══════════════════════════════════════════════════
   PASSKEY BUTTON — only show if credential exists on this device
══════════════════════════════════════════════════ */
(function initPasskeyButton() {
  if (!RV.passkey.isSupported()) return;
  const savedUid  = localStorage.getItem('rv_passkey_uid');
  const savedCred = localStorage.getItem('rv_passkey_cred');
  if (savedUid && savedCred) {
    document.getElementById('pkBtn').style.display  = 'flex';
    document.getElementById('pkNote').style.display = 'block';
  }
})();
</script>

</body>
</html>
